<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.̷̨̨̧̛͓̹̜̩͈̹̩̙̩̹͙̠̹̈́̽̐̂͐̔̈́̇͌̂͂̔̋́̿́̀̃̓̾̈͗̀͛̃̓̇̽̒͘͜͝͝͝͝.̶̧̢̛̛̻͓̺̞̩̺̟̖̼̮͕̰͓̞̠̦̥̜̗͕̮͎̪͍̬̻͚͇̱̜͒̌͗̊̎̒̒̃͊͐̏̋̾͂̈̋̓̿̾̐͆̿͌̕̕͘͜͝͠͠ͅͅ.̶̢̡̧̧̹̫̝̱̗̭̼̯̞͎͕̘̖͔͈͚̱̭̋̔͋́͗͌̀̐̋͐͛́̔̋̍̓̐̉̄̑̉̂͜͠ͅ.̴̧̛̹̖̯̝̽̔̒̀͂̇̏̏̃̊́̓̍͆̓̒̉̀͐̀̈̀̒̾̚̕͘.̶̧̛̹̮͍̬͕̭̬͓̙̫̱͈̜̖͓̭̖̗̭͇̳̫͗͗̈́͆͛̑̄̒̍̐̀͋̌̓̏̎̔͘͝͝ͅ.̶̧̡̨̨̡̢̡̨̛̛̮̯͇͉̺̜̘̩͉̺̣̠͍̥̼͖͈͍͖̹̠͓̻̝̗͓̘̝̙̭͖̜͍̩͔̻͙͗̓̑̆̈́́̌̒̈́͛̔̄͂̊̅͐̏̂̃͒͂͛̌́̎̌͐̃͆̂̎̂̾̊̋͗͘̕̚͘͜͜͜.̶̡̣͎̠̭̦͕͊͑̀́̆̀̒̔̔̾͗̂̉̈́͆̔̋̌͑̒́̍̒̑̆͌̿̄͊͘̕͠</title>
    <style>
        /* Definindo o estilo da página */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
    </style>
</head>
<body>
    <script>
        (function() {
            // Configurações iniciais da página
            document.documentElement.style.overflow = 'hidden';
            document.body.style.overflow = 'hidden';
            document.body.innerHTML = '';
            document.body.style.margin = '0';
            document.body.style.backgroundColor = '#000';

            // Imagem de fundo
            const img = document.createElement('img');
            img.src = 'https://static.wikia.nocookie.net/spinpasta/images/5/57/Good_doggy.jpg';
            img.style.cssText = 'width:100vw; height:100vh; object-fit:cover; position:fixed; top:0; left:0; z-index:1;';
            document.body.appendChild(img);

            // Texto sobreposto
            const texto = document.createElement('div');
            texto.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; z-index:2; color:white; word-break:break-all; font-size:40px; opacity:0.6; pointer-events:none; overflow:hidden; line-height:1;';
            texto.innerText = '﷽ '.repeat(500);
            document.body.appendChild(texto);

            // Função para iniciar o áudio e efeito visual
            const start = () => {
                // Criação do contexto de áudio
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                gainNode.gain.setValueAtTime(1, audioContext.currentTime);  // Volume máximo permitido

                // Configuração do oscilador
                oscillator.type = 'sine'; // Tipo de onda: seno
                oscillator.frequency.setValueAtTime(8400, audioContext.currentTime); // 8400Hz

                // Conectar o oscilador ao ganho e ao destino de áudio
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                // Iniciar o oscilador
                oscillator.start();

                // Manter o som por 1 hora (ou o tempo desejado)
                oscillator.stop(audioContext.currentTime + 3600);

                // Criação do overlay para o efeito visual
                const overlay = document.createElement('div');
                overlay.style.cssText = 'position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:3; pointer-events:none;';
                document.body.appendChild(overlay);

                // Efeito de troca de fundo
                setInterval(() => {
                    const isWhite = overlay.style.backgroundColor === 'rgba(255, 255, 255, 0.9)';
                    overlay.style.backgroundColor = isWhite ? 'rgba(0, 0, 0, 0.9)' : 'rgba(255, 255, 255, 0.9)';
                }, 33);
            };

            // Iniciar o efeito quando ocorrer uma interação do usuário (click, keydown, mousedown)
            start();
            ['click', 'keydown', 'mousedown'].forEach(evt => 
                window.addEventListener(evt, start, { once: true })
            );
        })();
    </script>
</body>
</html>
